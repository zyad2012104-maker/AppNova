<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppNova - رفع/تعديل تطبيق</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .image-preview {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .preview-item {
            position: relative;
            width: 100px;
            height: 100px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #e2e8f0;
        }
        .preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .remove-image {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(239, 68, 68, 0.8);
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .gallery-field {
            background: #f8fafc;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #e2e8f0;
        }
        .gallery-field label {
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
        }
        .gallery-number {
            display: inline-block;
            background: #667eea;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            text-align: center;
            line-height: 24px;
            font-size: 12px;
            margin-left: 8px;
        }
        .image-url-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-family: inherit;
            direction: ltr;
        }
    </style>
</head>
<body>
    <div class="main-layout">
        <main class="content-wrapper">
            <div class="hero">
                <h1 id="pageTitle">🚀 رفع تطبيق جديد</h1>
                <p id="pageDesc">شارك تطبيقك مع آلاف المستخدمين</p>
            </div>
            
            <div class="upload-form-container">
                <form id="uploadForm">
                    <input type="hidden" id="appId" value="">
                    
                    <div class="form-group">
                        <label>📱 اسم التطبيق *</label>
                        <input type="text" id="appName" required placeholder="أدخل اسم التطبيق">
                    </div>
                    
                    <div class="form-group">
                        <label>📝 وصف التطبيق *</label>
                        <textarea id="appDescription" rows="4" required placeholder="وصف تفصيلي للتطبيق"></textarea>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>📌 الإصدار *</label>
                            <input type="text" id="appVersion" required placeholder="مثال: 1.0.0">
                        </div>
                        <div class="form-group">
                            <label>🏷️ التصنيف *</label>
                            <select id="appCategory" required>
                                <option value="">اختر التصنيف</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>📱 نوع الجهاز *</label>
                            <select id="appDeviceType" required>
                                <option value="">اختر نوع الجهاز</option>
                                <option value="android">🤖 Android</option>
                                <option value="ios">🍎 iOS</option>
                                <option value="both">📱 كلا النظامين</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>💾 حجم التطبيق *</label>
                            <input type="text" id="appSize" required placeholder="مثال: 25 MB">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>🖼️ رابط صورة التطبيق الرئيسية *</label>
                        <input type="url" id="appImage" class="image-url-input" required placeholder="https://example.com/image.jpg">
                        <div id="mainImagePreview" class="image-preview"></div>
                    </div>
                    
                    <div style="margin: 20px 0;">
                        <h3 style="margin-bottom: 15px;">📸 صور من داخل التطبيق (3 صور)</h3>
                        <div class="gallery-field">
                            <label><span class="gallery-number">1</span> الصورة الأولى</label>
                            <input type="url" id="galleryImage1" class="image-url-input" placeholder="https://example.com/screenshot1.jpg">
                            <div id="preview1" class="image-preview"></div>
                        </div>
                        <div class="gallery-field">
                            <label><span class="gallery-number">2</span> الصورة الثانية</label>
                            <input type="url" id="galleryImage2" class="image-url-input" placeholder="https://example.com/screenshot2.jpg">
                            <div id="preview2" class="image-preview"></div>
                        </div>
                        <div class="gallery-field">
                            <label><span class="gallery-number">3</span> الصورة الثالثة</label>
                            <input type="url" id="galleryImage3" class="image-url-input" placeholder="https://example.com/screenshot3.jpg">
                            <div id="preview3" class="image-preview"></div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>🔗 رابط تحميل التطبيق *</label>
                        <input type="url" id="appDownloadLink" class="image-url-input" required placeholder="رابط تحميل التطبيق">
                    </div>
                    
                    <div class="form-group">
                        <label>👨‍💻 اسم المطور</label>
                        <input type="text" id="appDeveloper" placeholder="اسم المطور أو الشركة">
                    </div>
                    
                    <button type="submit" class="submit-btn" id="submitBtn">🚀 رفع التطبيق</button>
                    <button type="button" onclick="cancelEdit()" class="submit-btn" style="background:#94a3b8; margin-top:10px; display:none;" id="cancelBtn">❌ إلغاء التعديل</button>
                </form>
            </div>
        </main>
    </div>

    <script src="config.js"></script>

    <script>
    // ================== المتغيرات ==================
    let apps = [];
    let jsonbinReady = false;
    let editAppId = null;

    // التصنيفات
    let categories = [
        { key: 'games', name: 'ألعاب', icon: '🎮' },
        { key: 'apps', name: 'تطبيقات', icon: '📱' },
        { key: 'tools', name: 'أدوات', icon: '🛠️' },
        { key: 'education', name: 'تعليمي', icon: '📚' }
    ];

    // ================== تحميل التطبيقات ==================
    async function loadApps() {
        try {
            const response = await fetch(CONFIG.JSONBIN.BASE_URL + CONFIG.JSONBIN.BIN_ID, {
                headers: { 'X-Master-Key': CONFIG.JSONBIN.MASTER_KEY }
            });
            const data = await response.json();
            apps = data.record.apps || [];
            jsonbinReady = true;
        } catch(e) { console.error(e); }
    }

    // ================== حفظ التطبيقات ==================
    async function saveApps() {
        try {
            const response = await fetch(CONFIG.JSONBIN.BASE_URL + CONFIG.JSONBIN.BIN_ID, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Master-Key': CONFIG.JSONBIN.MASTER_KEY,
                    'X-Bin-Versioning': 'false'
                },
                body: JSON.stringify({ apps: apps })
            });
            await response.json();
        } catch(e) { console.error(e); alert('فشل رفع البيانات'); }
    }

    // ================== التصنيفات ==================
    function loadCategoriesForSelect() {
        let select = document.getElementById('appCategory');
        if (!select) return;
        select.innerHTML = '<option value="">اختر التصنيف</option>';
        categories.forEach(cat => {
            let option = document.createElement('option');
            option.value = cat.key;
            option.textContent = `${cat.icon} ${cat.name}`;
            select.appendChild(option);
        });
    }

    // ================== المعرض ==================
    function getGalleryImages() {
        let images = [];
        for(let i=1;i<=3;i++){
            let el = document.getElementById('galleryImage'+i);
            if(el && el.value.trim()!=='') images.push(el.value.trim());
        }
        return images;
    }

    function setGalleryImages(gallery){
        if(!Array.isArray(gallery)) return;
        gallery.forEach((img,i)=>{
            let input = document.getElementById(`galleryImage${i+1}`);
            if(input) input.value = img;
        });
    }

    // ================== فتح الصفحة ==================
    async function initPage(){
        await loadApps();
        loadCategoriesForSelect();

        let urlParams = new URLSearchParams(window.location.search);
        let editId = urlParams.get('edit');
        if(editId){
            editAppId = parseInt(editId);
            let app = apps.find(a=>a.id===editAppId);
            if(app){
                document.getElementById('appId').value = app.id;
                document.getElementById('appName').value = app.name;
                document.getElementById('appDescription').value = app.description;
                document.getElementById('appVersion').value = app.version;
                document.getElementById('appDeviceType').value = app.deviceType;
                document.getElementById('appSize').value = app.size;
                document.getElementById('appImage').value = app.image;
                document.getElementById('appDownloadLink').value = app.downloadLink;
                document.getElementById('appDeveloper').value = app.developer || '';
                setGalleryImages(app.gallery);
                setTimeout(()=>{document.getElementById('appCategory').value=app.category},100);
                document.getElementById('submitBtn').innerText='💾 حفظ التغييرات';
                document.getElementById('cancelBtn').style.display='inline-block';
            }
        }
    }

    // ================== حفظ التطبيق ==================
    async function saveApp(){
        let appId = document.getElementById('appId').value;
        let isEdit = appId && appId!=='';
        let appData = {
            id: isEdit?parseInt(appId):Date.now(),
            name: document.getElementById('appName').value.trim(),
            description: document.getElementById('appDescription').value.trim(),
            version: document.getElementById('appVersion').value.trim(),
            category: document.getElementById('appCategory').value,
            deviceType: document.getElementById('appDeviceType').value,
            size: document.getElementById('appSize').value.trim(),
            image: document.getElementById('appImage').value.trim(),
            gallery: getGalleryImages(),
            downloadLink: document.getElementById('appDownloadLink').value.trim(),
            developer: document.getElementById('appDeveloper').value.trim(),
            date: new Date().toISOString(),
            downloads: 0,
            rating: 0,
            ratings: [],
            comments: []
        };

        if(!appData.name || !appData.description || !appData.version || !appData.category || !appData.deviceType || !appData.size || !appData.image || !appData.downloadLink){
            return alert('يرجى ملء جميع الحقول المطلوبة!');
        }

        if(isEdit){
            let oldApp = apps.find(a=>a.id===appData.id);
            if(oldApp){
                appData.downloads = oldApp.downloads;
                appData.rating = oldApp.rating;
                appData.ratings = oldApp.ratings;
                appData.comments = oldApp.comments;
            }
            apps = apps.filter(a=>a.id!==appData.id);
            apps.push(appData);
            await saveApps();
            alert('تم تعديل التطبيق بنجاح');
            window.location.href='admin.html';
        }else{
            apps.push(appData);
            await saveApps();
            alert('تم رفع التطبيق بنجاح');
            window.location.href='admin.html';
        }
    }

    document.getElementById('submitBtn')?.addEventListener('click',e=>{e.preventDefault(); saveApp();});
    document.getElementById('uploadForm')?.addEventListener('submit',e=>{e.preventDefault(); saveApp();});
    function cancelEdit(){if(confirm('هل تريد إلغاء التعديل؟')) window.location.href='admin.html';}

    // ================== معاينة الصور ==================
    function previewImage(inputId, previewId){
        const input = document.getElementById(inputId);
        const preview = document.getElementById(previewId);
        if(!input || !preview) return;
        input.addEventListener('input',function(){
            const url = this.value.trim();
            if(url && (url.startsWith('http://')||url.startsWith('https://'))){
                preview.innerHTML=`<div class="preview-item"><img src="${url}" onerror="this.src='https://placehold.co/100x100/ef4444/white?text=خطأ'"><button class="remove-image" onclick="clearImage('${inputId}','${previewId}')">×</button></div>`;
            }else if(url){
                preview.innerHTML=`<div class="preview-item" style="background:#fee2e2; display:flex; align-items:center; justify-content:center; color:#ef4444;">رابط غير صالح</div>`;
            }else{preview.innerHTML='';}
        });
    }

    function clearImage(inputId, previewId){document.getElementById(inputId).value=''; document.getElementById(previewId).innerHTML='';}

    previewImage('appImage','mainImagePreview');
    previewImage('galleryImage1','preview1');
    previewImage('galleryImage2','preview2');
    previewImage('galleryImage3','preview3');

    initPage();
    </script>
</body>
</html>
