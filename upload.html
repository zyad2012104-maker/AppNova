<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppNova - رفع/تعديل تطبيق</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">🚀 AppNova</div>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="ابحث عن تطبيق...">
                <button onclick="searchApps()">🔍</button>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">🏠 الرئيسية</a></li>
                <li><a href="apps.html">📱 التطبيقات</a></li>
                <li id="uploadNav"><a href="upload.html">⬆️ رفع تطبيق</a></li>
                <li id="loginNav"><a href="login.html">🔐 تسجيل الدخول</a></li>
                <li id="adminNav" style="display:none;"><a href="admin.html">⚙️ الإدارة</a></li>
                <li id="userInfo" style="display:none;"></li>
            </ul>
        </div>
    </nav>

    <div class="main-layout">
        <aside class="ad-sidebar ad-left">
            <div class="ad-container">
                <script>
                    atOptions = {'key': 'd97eda55927b2ccbf2ad42d5cb6201f8', 'format': 'iframe', 'height': 600, 'width': 160};
                </script>
                <script src="https://www.highperformanceformat.com/d97eda55927b2ccbf2ad42d5cb6201f8/invoke.js"></script>
            </div>
        </aside>

        <main class="content-wrapper">
            <div class="hero" style="padding: 30px;">
                <h1 id="pageTitle">رفع تطبيق جديد</h1>
                <p id="pageDesc">شارك تطبيقك مع آلاف المستخدمين</p>
            </div>
            
            <div class="upload-form-container">
                <form id="uploadForm">
                    <input type="hidden" id="appId" value="">
                    <div class="form-group">
                        <label>اسم التطبيق *</label>
                        <input type="text" id="appName" required placeholder="أدخل اسم التطبيق">
                    </div>
                    <div class="form-group">
                        <label>وصف التطبيق *</label>
                        <textarea id="appDescription" rows="4" required placeholder="وصف تفصيلي للتطبيق"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>الإصدار *</label>
                            <input type="text" id="appVersion" required placeholder="مثال: 1.0.0">
                        </div>
                        <div class="form-group">
                            <label>التصنيف *</label>
                            <select id="appCategory" required>
                                <option value="">اختر التصنيف</option>
                                <option value="games">🎮 ألعاب</option>
                                <option value="social">💬 تواصل اجتماعي</option>
                                <option value="education">📚 تعليم</option>
                                <option value="productivity">💼 إنتاجية</option>
                                <option value="entertainment">🎬 ترفيه</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>نوع الجهاز *</label>
                            <select id="appDeviceType" required>
                                <option value="">اختر نوع الجهاز</option>
                                <option value="android">🤖 Android</option>
                                <option value="ios">🍎 iOS</option>
                                <option value="both">📱 كلا النظامين</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>حجم التطبيق *</label>
                            <input type="text" id="appSize" required placeholder="مثال: 25 MB">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>رابط صورة التطبيق *</label>
                        <input type="url" id="appImage" required placeholder="https://example.com/image.jpg">
                        <small>يمكنك استخدام رابط صورة من الإنترنت</small>
                    </div>
                    <div class="form-group">
                        <label>رابط تحميل التطبيق *</label>
                        <input type="url" id="appDownloadLink" required placeholder="رابط تحميل التطبيق">
                    </div>
                    <button type="submit" class="submit-btn" id="submitBtn">🚀 رفع التطبيق</button>
                    <button type="button" onclick="cancelEdit()" class="submit-btn" style="background:#94a3b8; margin-top:10px; display:none;" id="cancelBtn">إلغاء</button>
                </form>
            </div>
        </main>

        <aside class="ad-sidebar ad-right">
            <div class="ad-container">
                <script src="https://pl28941417.profitablecpmratenetwork.com/56/78/41/567841b929b9b0b5da580931d4c9140c.js"></script>
            </div>
            <div class="ad-container" style="margin-top: 20px;">
                <script>
                    atOptions = {'key': 'd97eda55927b2ccbf2ad42d5cb6201f8', 'format': 'iframe', 'height': 600, 'width': 160};
                </script>
                <script src="https://www.highperformanceformat.com/d97eda55927b2ccbf2ad42d5cb6201f8/invoke.js"></script>
            </div>
        </aside>
    </div>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-section"><h3>AppNova</h3><p>منصة عربية لتطبيقات الموبيل</p></div>
            <div class="footer-section"><h3>روابط</h3><ul><li><a href="index.html">الرئيسية</a></li><li><a href="apps.html">التطبيقات</a></li><li><a href="upload.html">رفع تطبيق</a></li></ul></div>
            <div class="footer-section"><h3>النشرة</h3><div class="newsletter"><input type="email" id="newsletterEmail" placeholder="بريدك"><button onclick="subscribeNewsletter()">اشتراك</button></div></div>
        </div>
        <div class="footer-bottom">© 2024 AppNova</div>
    </footer>

    <div id="adModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeAdModal()">&times;</span>
            <div id="modalAdContent"></div>
            <button onclick="closeAdModal()" class="submit-btn">إغلاق</button>
        </div>
    </div>

    <script src="common.js"></script>
    <script src="upload.js"></script>
</body>
</html>
